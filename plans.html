<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Select Your Plan</title>

<link rel="stylesheet" href="gymcss.css">

<style>

body{
font-family:Poppins;
background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.7)),
url("https://images.unsplash.com/photo-1534438327276-14e5300c3a48");
background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;
text-align:center;
padding:40px;
}

.plan-container{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
margin-top:40px;
}

.plan-card{
background:rgba(0,0,0,0.8);
padding:30px;
border-radius:10px;
width:250px;
}

.plan-card h3{
margin-bottom:10px;
}

.price{
font-size:28px;
font-weight:bold;
margin:15px 0;
}

.btn{
display:inline-block;
padding:10px 20px;
background:#ff4d4d;
color:white;
text-decoration:none;
border-radius:5px;
border:none;
cursor:pointer;
}

.btn:hover{
background:#ff1a1a;
}

form{
margin-top:40px;
}

input{
padding:10px;
margin:10px;
width:250px;
border:none;
border-radius:5px;
}

.back-btn{
position:absolute;
top:20px;
left:20px;
}

</style>

</head>

<body>

<a href="index.html" class="btn back-btn">⬅ Back</a>

<h1>Choose Your Membership</h1>

<div class="plan-container">

<div class="plan-card">
<h3>Basic</h3>
<p class="price">₹999</p>
<p>Gym Equipment Access</p>
<button class="btn" onclick="selectPlan('Basic')">Select</button>
</div>

<div class="plan-card">
<h3>Standard</h3>
<p class="price">₹1999</p>
<p>Gym + Personal Trainer</p>
<button class="btn" onclick="selectPlan('Standard')">Select</button>
</div>

<div class="plan-card">
<h3>Premium</h3>
<p class="price">₹2999</p>
<p>All Services Included</p>
<button class="btn" onclick="selectPlan('Premium')">Select</button>
</div>

</div>

<h2>Customer Details</h2>

<form id="planForm">

<input type="text" placeholder="Enter Name" required><br>

<input type="email" placeholder="Enter Email" required><br>

<input type="text" id="selectedPlan" placeholder="Selected Plan" readonly><br>

<button class="btn" type="submit">Confirm Membership</button>

</form>

<p id="successMsg" style="display:none;color:lightgreen;margin-top:20px;">
✅ Membership Registered Successfully!
</p>

<script>

function selectPlan(plan)
{
document.getElementById("selectedPlan").value = plan;
}

document.getElementById("planForm").addEventListener("submit",function(e){

e.preventDefault();

document.getElementById("successMsg").style.display="block";

});

</script>

</body>
</html>
